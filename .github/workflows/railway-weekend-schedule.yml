# ─────────────────────────────────────────────────────────────────────────────
# Railway Weekend Schedule  —  Stop on Friday night, Restart on Monday morning
# ─────────────────────────────────────────────────────────────────────────────

name: Railway Weekend Schedule

on:
  schedule:
    # Friday 11:40 PM IST = Friday 18:10 UTC  → STOP
    - cron: '10 18 * * 5'
    # Monday 7:55 AM IST = Monday 02:25 UTC   → START
    - cron: '25 2 * * 1'

  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'start'
        type: choice
        options:
          - start
          - stop

jobs:
  manage-railway-service:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Determine action
        id: action
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.action }}" = "start" ]; then
              echo "replicas=1" >> $GITHUB_OUTPUT
              echo "label=START" >> $GITHUB_OUTPUT
            else
              echo "replicas=0" >> $GITHUB_OUTPUT
              echo "label=STOP" >> $GITHUB_OUTPUT
            fi
          else
            DAY=$(date +%u)
            if [ "$DAY" = "5" ]; then
              echo "replicas=0" >> $GITHUB_OUTPUT
              echo "label=STOP (Friday night)" >> $GITHUB_OUTPUT
            else
              echo "replicas=1" >> $GITHUB_OUTPUT
              echo "label=START (Monday morning)" >> $GITHUB_OUTPUT
            fi
          fi

      # ── Step 1: Debug token ─────────────────────────────────────────────────
      - name: Debug token
        run: |
          TOKEN="${{ secrets.RAILWAY_API_TOKEN }}"
          echo "Token length: ${#TOKEN}"
          echo "Token first 10 chars: ${TOKEN:0:10}"
          echo "Token last 4 chars: ${TOKEN: -4}"

      # ── Step 2: Verify token works ──────────────────────────────────────────
      - name: Verify Railway token
        run: |
          echo "Checking Railway token..."
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"query": "{ me { name email } }"}' \
            https://backboard.railway.app/graphql/v2)
          echo "Token check response: $RESPONSE"
          if echo "$RESPONSE" | grep -q '"errors"'; then
            echo "❌ Token is invalid — check debug step above"
            exit 1
          fi
          echo "✅ Token is valid"

      # ── Step 2: Stop or start the service ───────────────────────────────────
      - name: Update Railway service
        run: |
          REPLICAS="${{ steps.action.outputs.replicas }}"
          LABEL="${{ steps.action.outputs.label }}"
          echo "Action: $LABEL  (replicas=$REPLICAS)"

          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data "{
              \"query\": \"mutation serviceInstanceUpdate(\$serviceId: String!, \$environmentId: String!, \$input: ServiceInstanceUpdateInput!) { serviceInstanceUpdate(serviceId: \$serviceId, environmentId: \$environmentId, input: \$input) }\",
              \"variables\": {
                \"serviceId\": \"${{ secrets.RAILWAY_SERVICE_ID }}\",
                \"environmentId\": \"${{ secrets.RAILWAY_ENVIRONMENT_ID }}\",
                \"input\": { \"numReplicas\": $REPLICAS }
              }
            }" \
            https://backboard.railway.app/graphql/v2)

          echo "Railway API response: $RESPONSE"

          if echo "$RESPONSE" | grep -q '"errors"'; then
            echo "❌ Railway API error — see response above for details"
            exit 1
          fi

          echo "✅ Done — service set to $REPLICAS replica(s)"
